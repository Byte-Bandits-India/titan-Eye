name: 🚀 Build & Deploy Titan React App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🏗 Inject Environment Variables
        run: |
          echo "VITE_API_BASE_URL=http://titaneye.duckdns.org/api" > .env
          echo "VITE_LOCAL_SERVICE_URL=http://localhost:3001/api" >> .env
          echo "VITE_API_BASE_URL=http://titaneye.duckdns.org/api" > .env.production
          echo "VITE_LOCAL_SERVICE_URL=http://localhost:3001/api" >> .env.production

      - name: 🏗 Build Vite App
        run: npm run build

      - name: 📦 Create Deployment Package
        run: |
          tar -czf deploy.tar.gz \
            dist \
            server.js \
            package.json \
            package-lock.json

      - name: 🔑 Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo -e "Host *\n\tStrictHostKeyChecking no\n\tUserKnownHostsFile=/dev/null\n" > ~/.ssh/config

      - name: 📤 Upload to Server (SCP)
        run: |
          scp -i ~/.ssh/id_rsa deploy.tar.gz ec2-user@${{ secrets.SERVER_IP }}:/tmp/

      - name: 🚀 Deploy on Server (SSH)
        run: |
          ssh -i ~/.ssh/id_rsa ec2-user@${{ secrets.SERVER_IP }} << 'EOF'
            echo "🚀 Starting deployment..."
            echo "📦 PRODUCTION DEPLOY"

            APP_DIR="/home/ec2-user/titan"
            PORT=3000
            APP_NAME="titan-prod"
            AGENT_NAME="titan-agent"
            AGENT_PORT=3001

            mkdir -p $APP_DIR
            cd $APP_DIR

            echo "🧹 Cleaning old files..."
            rm -rf dist node_modules package.json package-lock.json server.js

            echo "📦 Extracting new build..."
            tar -xzf /tmp/deploy.tar.gz -C $APP_DIR
            rm -f /tmp/deploy.tar.gz

            echo "📦 Installing production dependencies..."
            npm install --omit=dev --build-from-source

            echo "🧹 Stopping and cleaning up redundant titan-prod static process..."
            pm2 delete titan-prod > /dev/null 2>&1 || true

            echo "🔁 Restarting PM2 agent (titan-agent)..."
            pm2 describe $AGENT_NAME > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              pm2 restart $AGENT_NAME --update-env
            else
              pm2 start server.js --name "$AGENT_NAME"
            fi

            pm2 save

            echo "✅ Deployment completed!"
          EOF