<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Call on Teams</title>
<style>
  body {
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: #f3f2f1;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
  .card {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    padding: 40px 48px;
    text-align: center;
  }
  .card p {
    color: #616161;
    margin-bottom: 24px;
  }
  button {
    background: #5b5fc7;
    color: white;
    border: none;
    padding: 12px 28px;
    font-size: 16px;
    border-radius: 4px;
    cursor: pointer;
  }
  button:hover {
    background: #464775;
  }
  .note {
    margin-top: 16px;
    font-size: 13px;
    color: #a19f9d;
  }
</style>
</head>
<body>
  <div class="card">
    <p>Start a Teams call with <strong>dk@bytebandits.in</strong></p>
    <button onclick="startCall()">Call on Teams</button>
    <div class="note">If nothing happens, Teams will open in your browser instead.</div>
  </div>

<script>
  const TEAMS_USER = "dk@bytebandits.in";

  function startCall() {
    const appLink = `msteams://teams.microsoft.com/l/call/0/0?users=${TEAMS_USER}`;
    const webLink = `https://teams.microsoft.com/l/call/0/0?users=${TEAMS_USER}`;

    // Try the desktop app first
    window.location.href = appLink;

    // Fall back to the browser/web link if the app link didn't take
    setTimeout(() => {
      window.location.href = webLink;
    }, 1500);
  }
</script>
</body>
</html>
